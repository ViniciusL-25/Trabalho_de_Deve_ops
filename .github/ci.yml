name: QuickBite CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Testes ────────────────────────────────────────────────────────────
  test:
    name: Testes Automatizados
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependências do backend
        working-directory: ./backend
        run: npm install

      - name: Executar testes
        working-directory: ./backend
        run: npm test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: quickbite_test
          PORT: 3001

      - name: Upload resultado dos testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/coverage/

  # ── Job 2: Build ─────────────────────────────────────────────────────────────
  build:
    name: Build das Imagens Docker
    runs-on: ubuntu-latest
    needs: test   # só roda se os testes passarem

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build do backend
        run: docker build -t quickbite-backend:${{ github.sha }} ./backend

      - name: Build do frontend
        run: |
          docker build \
            --build-arg REACT_APP_API_URL=http://localhost:3001 \
            -t quickbite-frontend:${{ github.sha }} \
            ./frontend

      - name: Validar containers sobem corretamente
        run: |
          cp .env.example .env
          sed -i 's/sua_senha_aqui/testpassword/' .env
          docker compose up -d db backend
          sleep 20
          docker compose ps
          docker compose logs backend

  # ── Job 3: Publicar imagem (só em push para main) 
  publish:
    name: Publicar no Docker Hub
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e push do backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/quickbite-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/quickbite-backend:${{ github.sha }}

      - name: Build e push do frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            REACT_APP_API_URL=http://localhost:3001
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/quickbite-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/quickbite-frontend:${{ github.sha }}

      - name: Notificar sucesso do deploy
        run: |
          echo "✅ Deploy concluído com sucesso!"
          echo "Imagens publicadas com tag: ${{ github.sha }}"
